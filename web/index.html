<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CallFXO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1 data-i18n="app.title">CallFXO 控制台</h1>
      <div class="lang-switch">
        <label for="langSwitch" data-i18n="lang.label">語言</label>
        <select id="langSwitch">
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <section id="loginSection" class="panel auth-panel">
      <h2 data-i18n="login.title">登入</h2>
      <label data-i18n="login.username">帳號</label>
      <input id="loginUser" placeholder="admin" />
      <label data-i18n="login.password">密碼</label>
      <input id="loginPass" type="password" placeholder="******" />
      <div class="auth-actions">
        <button id="loginBtn" data-i18n="login.button">登入</button>
      </div>
      <div id="loginMsg" class="status" data-i18n="login.prompt">請輸入帳號密碼。</div>
    </section>

    <section id="appSection" class="hide" style="margin-top: 18px;">
      <div class="grid grid-2">
        <div class="panel" id="userAdminPanel">
          <div class="row" style="justify-content: space-between;">
            <h2 style="margin:0" data-i18n="users.title">使用者管理</h2>
            <button id="logoutBtn" class="warn" style="max-width: 120px;" data-i18n="logout">登出</button>
          </div>
          <div class="pw-wrap">
            <div class="level-title" data-i18n="pwd.title">修改密碼</div>
            <div class="row">
              <input id="myOldPass" type="password" data-i18n-ph="pwd.ph.old" placeholder="舊密碼" />
              <input id="myNewPass" type="password" data-i18n-ph="pwd.ph.new" placeholder="新密碼" />
              <button id="changeMyPassBtn" style="max-width: 130px;" data-i18n="pwd.button">修改</button>
            </div>
          </div>
          <div class="row admin-only">
            <input id="newUserName" data-i18n-ph="users.ph.username" placeholder="新帳號" />
            <input id="newUserPass" data-i18n-ph="users.ph.password" placeholder="新密碼" type="password" />
            <select id="newUserRole" style="max-width: 110px;">
              <option value="user" data-i18n="role.user">一般</option>
              <option value="admin" data-i18n="role.admin">管理員</option>
            </select>
            <button id="addUserBtn" style="max-width: 120px;" data-i18n="users.add">新增</button>
          </div>
          <table class="table admin-only" style="margin-top:10px;">
            <thead>
              <tr>
                <th data-i18n="users.col.id">ID</th>
                <th data-i18n="users.col.username">帳號</th>
                <th data-i18n="users.col.role">角色</th>
                <th data-i18n="users.col.action">操作</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>

        <div class="panel" id="boxAdminPanel">
          <h2 data-i18n="fxo.title">FXO 盒子管理</h2>
          <div class="row">
            <input id="boxName" data-i18n-ph="fxo.ph.name" placeholder="顯示名稱" />
            <input id="boxUser" data-i18n-ph="fxo.ph.user" placeholder="SIP 帳號" />
            <input id="boxPass" data-i18n-ph="fxo.ph.pass" placeholder="SIP 密碼" />
            <button id="addBoxBtn" class="alt" style="max-width: 120px;" data-i18n="fxo.add">新增</button>
          </div>
          <table class="table" style="margin-top:10px;">
            <thead>
              <tr>
                <th data-i18n="fxo.col.name">名稱</th>
                <th data-i18n="fxo.col.username">帳號</th>
                <th data-i18n="fxo.col.status">狀態</th>
                <th data-i18n="fxo.col.action">操作</th>
              </tr>
            </thead>
            <tbody id="boxesTable"></tbody>
          </table>
          <small data-i18n="fxo.tip">提示：FXO 盒子請使用這裡設定的 SIP 帳號密碼向本伺服器 REGISTER。</small>
        </div>
      </div>

      <div class="grid grid-2" style="margin-top: 16px;">
        <div class="panel">
          <h2 data-i18n="dial.title">撥號</h2>
          <label data-i18n="dial.boxLabel">選擇 FXO 盒子</label>
          <select id="dialBox"></select>
          <label data-i18n="dial.numberLabel">電話號碼</label>
          <input id="dialNumber" data-i18n-ph="dial.ph.number" placeholder="例如 0912345678" />
          <div class="row" style="margin-top:10px;">
            <button id="dialBtn" class="alt" data-i18n="dial.button">撥號</button>
            <button id="hangupBtn" class="warn" data-i18n="dial.hangup">掛斷</button>
          </div>
          <div id="callStatus" class="status" data-i18n="dial.idle">未通話</div>
          <div class="status" id="wsStatus" data-i18n="ws.disconnected">WebSocket: 未連線</div>

          <div class="level-wrap">
            <div class="level-title"><span id="volumeLabel" data-i18n="audio.volume">播放音量</span> <span id="volumeValue">100%</span></div>
            <input id="volumeSlider" type="range" min="0" max="100" step="1" value="100" />
          </div>

          <div class="kpad" id="kpad">
            <button data-dtmf="1">1</button><button data-dtmf="2">2</button><button data-dtmf="3">3</button>
            <button data-dtmf="4">4</button><button data-dtmf="5">5</button><button data-dtmf="6">6</button>
            <button data-dtmf="7">7</button><button data-dtmf="8">8</button><button data-dtmf="9">9</button>
            <button data-dtmf="*">*</button><button data-dtmf="0">0</button><button data-dtmf="#">#</button>
          </div>
        </div>

        <div class="panel split-panel">
          <div class="split-pane">
            <div class="pane-header">
              <h2 data-i18n="logs.title">撥號紀錄</h2>
              <div class="page-row">
                <button id="callLogsPrevBtn" class="plain-btn" data-i18n="logs.prev">上一頁</button>
                <span id="callLogsPageInfo" class="muted">1 / 1</span>
                <button id="callLogsNextBtn" class="plain-btn" data-i18n="logs.next">下一頁</button>
              </div>
            </div>
            <div class="records-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th data-i18n="logs.col.time">時間</th>
                    <th data-i18n="logs.col.box">盒子</th>
                    <th data-i18n="logs.col.number">號碼</th>
                    <th data-i18n="logs.col.status">狀態</th>
                    <th data-i18n="logs.col.reason">原因</th>
                  </tr>
                </thead>
                <tbody id="callLogsTable"></tbody>
              </table>
            </div>
          </div>

          <div class="split-pane">
            <h2 data-i18n="contacts.title">通訊錄</h2>
            <input id="contactSearch" data-i18n-ph="contacts.ph.search" placeholder="搜尋名稱或電話" />
            <div class="row" style="margin-top:8px;">
              <input id="contactName" data-i18n-ph="contacts.ph.name" placeholder="姓名" />
              <input id="contactNumber" data-i18n-ph="contacts.ph.number" placeholder="電話" />
              <button id="addContactBtn" class="alt" style="max-width: 120px;" data-i18n="contacts.add">新增</button>
            </div>
            <div class="records-wrap" style="margin-top:8px;">
              <table class="table">
                <thead>
                  <tr>
                    <th data-i18n="contacts.col.name">姓名</th>
                    <th data-i18n="contacts.col.number">電話</th>
                    <th data-i18n="contacts.col.action">操作</th>
                  </tr>
                </thead>
                <tbody id="contactsTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
