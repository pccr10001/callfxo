name: Release Build And Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional. Existing release tag to publish (e.g. v1.2.3). Leave empty to use selected ref/tag.
        required: false
        type: string
      push_ghcr:
        description: Push server and coturn container images to GHCR
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Verify release exists for selected tag
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        with:
          script: |
            let tag = (process.env.INPUT_RELEASE_TAG || '').trim()
            if (!tag) {
              if (context.ref.startsWith('refs/tags/')) {
                tag = context.ref.replace('refs/tags/', '')
              } else {
                core.setFailed('No release_tag provided. Please either fill release_tag or run this workflow from a tag ref.')
                return
              }
            }
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              })
              core.info(`Release found: id=${data.id}, tag=${data.tag_name}`)
              core.setOutput('release_tag', tag)
            } catch (err) {
              core.setFailed(`Release not found for tag "${tag}": ${err.message}`)
            }

  build-server:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build server binaries
        env:
          TAG: ${{ needs.verify-release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/callfxo-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/callfxo-linux-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/callfxo-windows-amd64.exe .

          tar -C dist -czf "dist/callfxo-${TAG}-linux-amd64.tar.gz" callfxo-linux-amd64
          tar -C dist -czf "dist/callfxo-${TAG}-linux-arm64.tar.gz" callfxo-linux-arm64
          (cd dist && zip -9 "callfxo-${TAG}-windows-amd64.zip" callfxo-windows-amd64.exe)

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-assets
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Build Android debug APK (debug signed)
        env:
          TAG: ${{ needs.verify-release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          pushd android
          ./gradlew --no-daemon :app:assembleDebug
          popd

          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/callfxo-${TAG}-android-debug.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: dist/*.apk
          if-no-files-found: error

  docker-ghcr:
    runs-on: ubuntu-latest
    needs: verify-release
    if: ${{ inputs.push_ghcr }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "COTURN_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}-coturn" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.verify-release.outputs.release_tag }}

      - name: Build and push coturn multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./coturn
          file: ./coturn/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.COTURN_IMAGE_NAME }}:${{ needs.verify-release.outputs.release_tag }}

  upload-release-assets:
    runs-on: ubuntu-latest
    needs:
      - verify-release
      - build-server
      - build-android
    steps:
      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-assets
          path: release-assets/server

      - name: Download android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-assets
          path: release-assets/android

      - name: Upload artifacts to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-release.outputs.release_tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/server/*.tar.gz
            release-assets/server/*.zip
            release-assets/android/*.apk
